services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: questly
      POSTGRES_PASSWORD: questly
      POSTGRES_DB: questly
    ports:
      # Host port 5433, not 5432 — many dev machines (including this one)
      # already run a native Postgres on 5432, which silently wins the port
      # and makes Docker's mapping unreachable without erroring.
      - '5433:5432'
    volumes:
      - questly-postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - questly-redis-data:/data

volumes:
  questly-postgres-data:
  questly-redis-data:
